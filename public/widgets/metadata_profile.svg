<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 740" preserveAspectRatio="xMidYMid meet" font-family="monospace">
  <defs>
    <radialGradient id="amg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd27f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- left: intercepted, sealed messages (contents locked, label exposed) -->
  <text x="150" y="118" font-size="22" fill="#c79a52">INTERCEPTED</text>
  <text x="150" y="146" font-size="16" fill="#6b5a3a">contents encrypted &#183; metadata in the clear</text>

  <!-- chip template repeated; each fades/slides in on a stagger -->
  <!-- chip 1 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.06;0.10;0.94;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" keyTimes="0;0.06;0.10;1" values="0 16;0 16;0 0;0 0"/>
    <rect x="150" y="170" width="520" height="56" rx="6" fill="#0d0b08" stroke="#3a2f1a" stroke-width="2"/>
    <rect x="150" y="170" width="5" height="56" fill="#ffd27f"/>
    <g fill="#ffd27f" transform="translate(176,184)"><rect x="0" y="9" width="18" height="14" rx="2"/><path d="M3 9 v-3 a6 6 0 0 1 12 0 v3" fill="none" stroke="#ffd27f" stroke-width="2.5"/></g>
    <text x="214" y="206" font-size="24" fill="#f3e4c4">ORIGIN &#183; 8080 BLOCK</text>
  </g>
  <!-- chip 2 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.18;0.22;0.94;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" keyTimes="0;0.18;0.22;1" values="0 16;0 16;0 0;0 0"/>
    <rect x="150" y="238" width="520" height="56" rx="6" fill="#0d0b08" stroke="#3a2f1a" stroke-width="2"/>
    <rect x="150" y="238" width="5" height="56" fill="#ffd27f"/>
    <g fill="#ffd27f" transform="translate(176,252)"><rect x="0" y="9" width="18" height="14" rx="2"/><path d="M3 9 v-3 a6 6 0 0 1 12 0 v3" fill="none" stroke="#ffd27f" stroke-width="2.5"/></g>
    <text x="214" y="274" font-size="24" fill="#f3e4c4">TIME &#183; 02:14</text>
  </g>
  <!-- chip 3 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.30;0.34;0.94;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" keyTimes="0;0.30;0.34;1" values="0 16;0 16;0 0;0 0"/>
    <rect x="150" y="306" width="520" height="56" rx="6" fill="#0d0b08" stroke="#3a2f1a" stroke-width="2"/>
    <rect x="150" y="306" width="5" height="56" fill="#ffd27f"/>
    <g fill="#ffd27f" transform="translate(176,320)"><rect x="0" y="9" width="18" height="14" rx="2"/><path d="M3 9 v-3 a6 6 0 0 1 12 0 v3" fill="none" stroke="#ffd27f" stroke-width="2.5"/></g>
    <text x="214" y="342" font-size="24" fill="#f3e4c4">WITH &#183; DOC</text>
  </g>
  <!-- chip 4 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.42;0.46;0.94;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" keyTimes="0;0.42;0.46;1" values="0 16;0 16;0 0;0 0"/>
    <rect x="150" y="374" width="520" height="56" rx="6" fill="#0d0b08" stroke="#3a2f1a" stroke-width="2"/>
    <rect x="150" y="374" width="5" height="56" fill="#ffd27f"/>
    <g fill="#ffd27f" transform="translate(176,388)"><rect x="0" y="9" width="18" height="14" rx="2"/><path d="M3 9 v-3 a6 6 0 0 1 12 0 v3" fill="none" stroke="#ffd27f" stroke-width="2.5"/></g>
    <text x="214" y="410" font-size="24" fill="#f3e4c4">SITE &#183; THE ARCHIVE</text>
  </g>
  <!-- chip 5 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.54;0.58;0.94;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" keyTimes="0;0.54;0.58;1" values="0 16;0 16;0 0;0 0"/>
    <rect x="150" y="442" width="520" height="56" rx="6" fill="#0d0b08" stroke="#3a2f1a" stroke-width="2"/>
    <rect x="150" y="442" width="5" height="56" fill="#ffd27f"/>
    <g fill="#ffd27f" transform="translate(176,456)"><rect x="0" y="9" width="18" height="14" rx="2"/><path d="M3 9 v-3 a6 6 0 0 1 12 0 v3" fill="none" stroke="#ffd27f" stroke-width="2.5"/></g>
    <text x="214" y="478" font-size="24" fill="#f3e4c4">ROUTE &#183; VPN STATION</text>
  </g>

  <!-- right: the profile filling in -->
  <text x="1150" y="118" font-size="22" fill="#c79a52" text-anchor="middle">SUBJECT PROFILE</text>
  <circle cx="1150" cy="320" r="150" fill="url(#amg)" opacity="0.7"/>

  <!-- faint outline always present -->
  <g fill="none" stroke="#4a4a4a" stroke-width="3">
    <circle cx="1150" cy="270" r="72"/>
    <path d="M1040 470 q0 -120 110 -120 q110 0 110 120 z"/>
  </g>
  <!-- filled silhouette accumulates as chips arrive -->
  <g fill="#8a8a8a">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite"
      keyTimes="0;0.10;0.22;0.34;0.46;0.58;0.70;0.94;1"
      values="0;0.18;0.36;0.54;0.72;0.9;1;1;0"/>
    <circle cx="1150" cy="270" r="72"/>
    <path d="M1040 470 q0 -120 110 -120 q110 0 110 120 z"/>
  </g>

  <!-- IDENTIFIED stamp -->
  <g opacity="0" transform="rotate(-12 1150 300)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" keyTimes="0;0.70;0.78;0.94;1" values="0;0;1;1;0"/>
    <rect x="1010" y="276" width="280" height="64" fill="none" stroke="#ff8a7a" stroke-width="5" rx="6"/>
    <text x="1150" y="320" font-size="38" fill="#ff8a7a" text-anchor="middle" letter-spacing="4">IDENTIFIED</text>
  </g>

  <!-- confidence meter -->
  <text x="990" y="556" font-size="18" fill="#c79a52">PROFILE</text>
  <rect x="990" y="566" width="320" height="16" fill="#1a1a1a"/>
  <rect x="990" y="566" width="10" height="16" fill="#ffd27f">
    <animate attributeName="width" dur="9s" repeatCount="indefinite"
      keyTimes="0;0.08;0.70;0.94;1" values="0;0;320;320;0"/>
  </rect>

  <text x="800" y="660" font-size="24" fill="#f4f4f4" text-anchor="middle">The contents stay sealed. The pattern gives you up anyway.</text>
</svg>
